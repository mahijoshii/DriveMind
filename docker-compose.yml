services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: drivemind
      POSTGRES_USER: drivemind
      POSTGRES_PASSWORD: drivemind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://drivemind:drivemind@db:5432/drivemind
      FRONTEND_URL: http://localhost:5173
      BACKEND_URL: http://localhost:8000
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
